<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE_META}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">

  <!-- OGP -->
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{CANONICAL_URL}}">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <!-- Structured Data: BlogPosting -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{OG_TITLE}}",
    "description": "{{DESCRIPTION}}",
    "author": {"@type": "Person", "name": "オチつかないヒト"},
    "datePublished": "{{DATE}}",
    "dateModified": "{{DATE}}",
    "publisher": {
      "@type": "Organization",
      "name": "オチつかないカンパニー",
      "logo": {"@type": "ImageObject", "url": "https://otitukanaihito.github.io/images/hero_banner.png"}
    },
    "mainEntityOfPage": {"@type": "WebPage", "@id": "{{CANONICAL_URL}}"},
    "image": "{{OG_IMAGE}}"
  }
  </script>

  <!-- Structured Data: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://otitukanaihito.github.io/"},
      {"@type": "ListItem", "position": 2, "name": "{{CATEGORY}}", "item": "https://otitukanaihito.github.io/categories.html#{{CATEGORY_ID}}"},
      {"@type": "ListItem", "position": 3, "name": "{{OG_TITLE}}", "item": "{{CANONICAL_URL}}"}
    ]
  }
  </script>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-MDWZM4DL');</script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"></noscript>

  <!-- Styles: Tailwind utilities + Brutalist design layer -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../brutalist.css">
</head>

<body>
  <!-- GTM noscript -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MDWZM4DL" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- ── HEADER ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="site-header-inner">
      <a href="../index.html" class="site-logo">オチつかないカンパニー</a>

      <nav id="desktop-nav" aria-label="メインナビゲーション">
        <ul class="site-nav-list">
          <li><a href="../index.html#blog">ブログ</a></li>
          <li><a href="../categories.html">カテゴリー</a></li>
          <li><a href="../index.html#affiliate">おすすめツール</a></li>
          <li><a href="../index.html#about">プロフィール</a></li>
          <li><a href="../index.html#contact">お問い合わせ</a></li>
        </ul>
      </nav>

      <button id="hamburger-btn" aria-label="メニューを開く" aria-expanded="false" aria-controls="mobile-menu">
        <svg id="menu-icon" width="18" height="13" viewBox="0 0 18 13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
          <line x1="0" y1="1.5" x2="18" y2="1.5"/>
          <line x1="0" y1="6.5" x2="18" y2="6.5"/>
          <line x1="0" y1="11.5" x2="18" y2="11.5"/>
        </svg>
        <svg id="close-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" style="display:none;">
          <line x1="0" y1="0" x2="14" y2="14"/>
          <line x1="14" y1="0" x2="0" y2="14"/>
        </svg>
      </button>
    </div>

    <div id="mobile-menu" role="navigation" aria-label="モバイルメニュー">
      <ul class="mobile-nav-list">
        <li><a href="../index.html#blog">ブログ</a></li>
        <li><a href="../categories.html">カテゴリー</a></li>
        <li><a href="../index.html#affiliate">おすすめツール</a></li>
        <li><a href="../index.html#about">プロフィール</a></li>
        <li><a href="../index.html#contact">お問い合わせ</a></li>
      </ul>
    </div>
  </header>

  <!-- ── ARTICLE ────────────────────────────────────────── -->
  <main>
    <div class="article-wrap">
      <!-- Black typographic header (replaces gradient banner) -->
      <div class="article-header">
        <div class="article-meta">
          <span class="category-tag">{{CATEGORY}}</span>
          <span class="article-date">{{DATE}}</span>
        </div>
        <h1 class="article-title">{{H1}}</h1>
        <p class="article-lead">{{SUBTITLE}}</p>
      </div>

      <!-- Article body -->
      <div class="article-body">
        {{CONTENT}}
      </div>
    </div>
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="site-footer" id="contact">
    <div class="site-footer-inner">
      <a href="../index.html" class="footer-logo">オチつかないカンパニー</a>
      <div class="footer-tagline">福祉 × IT × 試行錯誤の記録</div>
      <nav class="footer-nav" aria-label="フッターナビゲーション">
        <a href="../index.html#blog">ブログ</a>
        <a href="../categories.html">カテゴリー</a>
        <a href="../index.html#affiliate">おすすめツール</a>
        <a href="../index.html#about">プロフィール</a>
        <a href="../privacy-policy.html">プライバシーポリシー</a>
      </nav>
      <div class="footer-copy">© 2026 OCHITSUKANAI COMPANY. All rights reserved.</div>
    </div>
  </footer>

  <!-- Hamburger JS -->
  <script>
    (function () {
      var btn = document.getElementById('hamburger-btn');
      var menu = document.getElementById('mobile-menu');
      var menuIcon = document.getElementById('menu-icon');
      var closeIcon = document.getElementById('close-icon');

      btn.addEventListener('click', function () {
        var isOpen = menu.classList.toggle('open');
        menuIcon.style.display = isOpen ? 'none' : 'block';
        closeIcon.style.display = isOpen ? 'block' : 'none';
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        btn.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
      });
    })();
  </script>
  <script src="../back-home.js"></script>
</body>
</html>
